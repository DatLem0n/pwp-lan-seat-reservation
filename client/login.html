<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | LAN Seat Reservation</title>
  <script>
    if (localStorage.getItem("seatApiToken")) {
      document.documentElement.classList.add("is-authenticated");
      window.location.replace("./seats.html");
    }
  </script>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="container">
    <header>
      <h1>Login</h1>
      <p class="subtitle">Sign in to reserve seats</p>
    </header>

    <nav class="top-nav">
      <a href="./index.html">Home</a>
      <a href="./register.html">Register</a>
    </nav>

    <section class="card">
      <h2>Login</h2>
      <form id="loginForm">
        <label for="loginUsername">Username</label>
        <input id="loginUsername" required>
        <label for="loginPassword">Password</label>
        <input id="loginPassword" type="password" required>
        <button type="submit">Login</button>
      </form>
      <p class="muted">No account yet? <a href="./register.html">Register here</a>.</p>
      <div class="row inline">
        <span id="authStatus" class="status">Not logged in</span>
        <button id="logoutButton" type="button">Logout</button>
      </div>
    </section>

    <section class="card">
      <h2>Output</h2>
      <pre id="output"></pre>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
