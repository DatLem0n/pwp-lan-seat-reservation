<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manage Events | LAN Seat Reservation</title>
  <script>
    (function () {
      if (!localStorage.getItem("seatApiToken")) {
        var next = "manage.html" + (window.location.search || "");
        window.location.replace("./login.html?next=" + encodeURIComponent(next));
      }
    }());
  </script>
  <script>
    if (localStorage.getItem("seatApiToken")) {
      document.documentElement.classList.add("is-authenticated");
    }
  </script>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="container">
    <header>
      <h1>Manage Events</h1>
      <p class="subtitle">Create and delete events, locations, and seats</p>
    </header>

    <nav class="top-nav">
      <a href="./index.html">Home</a>
      <a href="./login.html">Login</a>
      <a href="./register.html">Register</a>
      <a href="./seats.html">Reserve Seats</a>
      <a href="./manage.html">Manage Events</a>
      <button id="logoutButton" type="button">Logout</button>
    </nav>

    <section class="card">
      <h2>Current Selection</h2>
      <div class="row">
        <label for="eventSelect">Event</label>
        <select id="eventSelect"></select>
        <button id="refreshEventsButton" type="button">Refresh events</button>
      </div>
      <div class="row">
        <label for="locationSelect">Location</label>
        <select id="locationSelect"></select>
        <button id="refreshLocationsButton" type="button">Refresh locations</button>
      </div>
      <p class="muted">Select event/location first for delete/create actions below.</p>
    </section>

    <section class="card">
      <h2>Manage Data</h2>
      <div class="auth-grid">
        <form id="createEventForm">
          <h3>Create event</h3>
          <label for="eventName">Name</label>
          <input id="eventName" maxlength="64" required>
          <label for="eventDescription">Description</label>
          <input id="eventDescription" maxlength="256">
          <label for="eventDate">Date</label>
          <input id="eventDate" type="date" required>
          <button type="submit">Create event</button>
          <button id="deleteEventButton" type="button">Delete selected event</button>
        </form>

        <form id="createLocationForm">
          <h3>Create location</h3>
          <label for="locationName">Name</label>
          <input id="locationName" maxlength="64" required>
          <button type="submit">Create location in selected event</button>
          <button id="deleteLocationButton" type="button">Delete selected location</button>
        </form>

        <form id="createSeatsForm">
          <h3>Create seats</h3>
          <label for="seatType">Type</label>
          <input id="seatType" maxlength="20" placeholder="normal" required>
          <label for="seatCount">Seat count</label>
          <input id="seatCount" type="number" min="1" value="1" required>
          <button type="submit">Create seats in selected location</button>
        </form>
      </div>
    </section>

    <section class="card">
      <h2>Output</h2>
      <pre id="output"></pre>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
