<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register | LAN Seat Reservation</title>
  <script>
    if (localStorage.getItem("seatApiToken")) {
      document.documentElement.classList.add("is-authenticated");
      window.location.replace("./seats.html");
    }
  </script>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="container">
    <header>
      <h1>Register</h1>
      <p class="subtitle">Create an account</p>
    </header>

    <nav class="top-nav">
      <a href="./index.html">Home</a>
      <a href="./login.html">Login</a>
    </nav>

    <section class="card">
      <h2>Register</h2>
      <form id="registerForm">
        <label for="regUsername">Username</label>
        <input id="regUsername" required>
        <label for="regFirstName">First name</label>
        <input id="regFirstName" required>
        <label for="regLastName">Last name</label>
        <input id="regLastName" required>
        <label for="regEmail">Email</label>
        <input id="regEmail" type="email" required>
        <label for="regPassword">Password</label>
        <input id="regPassword" type="password" required>
        <label for="regPhone">Phone</label>
        <input id="regPhone" required>
        <label for="regDob">Date of birth</label>
        <input id="regDob" type="date">
        <button type="submit">Register</button>
      </form>
      <p class="muted">Already have an account? <a href="./login.html">Login here</a>.</p>
      <div class="row inline">
        <span id="authStatus" class="status">Not logged in</span>
        <button id="logoutButton" type="button">Logout</button>
      </div>
    </section>

    <section class="card">
      <h2>Output</h2>
      <pre id="output"></pre>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
